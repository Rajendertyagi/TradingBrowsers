name: Build TTBrowserGPT

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore TTBrowserGPT.csproj

      - name: Build project
        run: dotnet build TTBrowserGPT.csproj -c Release

      # Fastest startup + smallest EXE.
      # Requires the .NET 8 Desktop Runtime to be installed on the target PC.
      - name: Publish fastest startup build
        run: >
          dotnet publish TTBrowserGPT.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true
          -p:TrimMode=partial
          -p:PublishReadyToRun=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -p:InvariantGlobalization=true
          -p:IncludeNativeLibrariesForSelfExtract=false
          -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TTBrowserGPT-win-x64-fastest-startup
          path: publish/
