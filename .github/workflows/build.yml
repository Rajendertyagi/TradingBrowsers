name: Build TTBrowserGPT

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Restore NuGet packages, including Microsoft.Web.WebView2
      - name: Restore dependencies
        run: dotnet restore TTBrowserGPT.csproj

      # Build (without --no-restore to ensure package references are available)
      - name: Build project
        run: dotnet build TTBrowserGPT.csproj -c Release

      # Publish portable self-contained build
      - name: Publish self-contained build
        run: >
          dotnet publish TTBrowserGPT.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:PublishReadyToRun=true
          -o publish

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TTBrowserGPT-win-x64-self-contained
          path: publish/
