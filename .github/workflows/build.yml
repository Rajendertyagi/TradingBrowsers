name: Build TTBrowserGPT

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Clear NuGet caches
        run: dotnet nuget locals all --clear

      - name: Restore WebView2 package explicitly
        run: dotnet add TTBrowserGPT.csproj package Microsoft.Web.WebView2 --version 1.0.3351.48

      - name: Restore dependencies
        run: dotnet restore TTBrowserGPT.csproj --force --no-cache

      - name: Build project
        run: dotnet build TTBrowserGPT.csproj -c Release

      - name: Publish
        run: >
          dotnet publish TTBrowserGPT.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TTBrowserGPT-win-x64
          path: publish/
