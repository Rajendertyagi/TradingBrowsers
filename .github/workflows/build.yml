- name: Publish optimized build
  run: >
    dotnet publish TTBrowserGPT.csproj
    -c Release
    -r win-x64
    --self-contained true
    -p:PublishSingleFile=true
    -p:PublishTrimmed=true
    -p:TrimMode=partial
    -p:PublishReadyToRun=true
    -p:EnableCompressionInSingleFile=true
    -p:DebugType=None
    -o publish
