name: Build TTBrowserGPT

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Clear NuGet cache
        run: dotnet nuget locals all --clear

      - name: Restore packages
        run: dotnet restore ./TTBrowserGPT.csproj --force --no-cache

      - name: Build
        run: dotnet build ./TTBrowserGPT.csproj -c Release

      - name: Publish
        run: >
          dotnet publish ./TTBrowserGPT.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o publish

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TTBrowserGPT-win-x64
          path: publish/
